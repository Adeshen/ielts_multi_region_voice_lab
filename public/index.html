<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IELTS Regional TTS</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="composer" aria-labelledby="app-title">
        <div class="title-block">
          <p class="eyebrow">IELTS Speaking Practice</p>
          <h1 id="app-title">Regional English Voice Lab</h1>
        </div>

        <form id="tts-form" class="tts-form">
          <label class="field-label" for="text">Sentence</label>
          <textarea
            id="text"
            name="text"
            maxlength="2000"
            rows="5"
            placeholder="Some people believe that public transport should be free in large cities."
            required
          ></textarea>

          <div class="form-meta">
            <span id="char-count">0 / 2000</span>
            <button type="button" id="sample-button" class="ghost-button">Sample</button>
          </div>

          <fieldset class="voice-grid">
            <legend>Regional voices</legend>
            <div class="voice-grid-body">
              <label class="voice-option">
                <input type="checkbox" name="voices" value="us_female" checked />
                <span>
                  <strong>US Female</strong>
                  <small>American English</small>
                </span>
              </label>
              <label class="voice-option">
                <input type="checkbox" name="voices" value="us_male" />
                <span>
                  <strong>US Male</strong>
                  <small>American English</small>
                </span>
              </label>
              <label class="voice-option">
                <input type="checkbox" name="voices" value="uk_female" checked />
                <span>
                  <strong>UK Female</strong>
                  <small>British English</small>
                </span>
              </label>
              <label class="voice-option">
                <input type="checkbox" name="voices" value="uk_male" />
                <span>
                  <strong>UK Male</strong>
                  <small>British English</small>
                </span>
              </label>
              <label class="voice-option">
                <input type="checkbox" name="voices" value="au_male" checked />
                <span>
                  <strong>AU Male</strong>
                  <small>Australian English</small>
                </span>
              </label>
              <label class="voice-option">
                <input type="checkbox" name="voices" value="en_expressive_female" />
                <span>
                  <strong>Expressive Female</strong>
                  <small>General English</small>
                </span>
              </label>
            </div>
          </fieldset>

          <div class="slider-row">
            <label for="speed">Speed <span id="speed-value">1.00x</span></label>
            <input id="speed" name="speed" type="range" min="0.5" max="1.5" step="0.05" value="1" />
          </div>

          <div class="slider-row">
            <label for="volume">Volume <span id="volume-value">1.00x</span></label>
            <input id="volume" name="volume" type="range" min="0.5" max="1.5" step="0.05" value="1" />
          </div>

          <button type="submit" id="generate-button" class="primary-button">Generate voices</button>
        </form>
      </section>

      <section class="workspace" aria-live="polite">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Current result</p>
            <h2>Audio comparison</h2>
          </div>
        </div>
        <div id="status" class="status"></div>
        <div id="results" class="result-grid empty-state">Generated audio will appear here.</div>

        <div class="history-header">
          <div>
            <p class="eyebrow">Local archive</p>
            <h2>History</h2>
          </div>
          <div class="history-actions">
            <span id="history-page-status" class="page-status"></span>
            <button type="button" id="history-prev" class="ghost-button">Prev</button>
            <button type="button" id="history-next" class="ghost-button">Next</button>
            <button type="button" id="clear-history" class="ghost-button">Clear</button>
          </div>
        </div>
        <div id="history" class="history-list empty-state">No saved generations yet.</div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
