<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IELTS Dictation Practice</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell dictation-shell">
      <section class="composer" aria-labelledby="dictation-title">
        <div class="title-block">
          <p class="eyebrow">IELTS Listening Practice</p>
          <h1 id="dictation-title">Dictation Mode</h1>
        </div>
        <nav class="mode-tabs" aria-label="Practice modes">
          <a class="mode-tab" href="/">TTS comparison</a>
          <a class="mode-tab" href="/speaking.html">Speaking recording</a>
          <a class="mode-tab" href="/voice-notes.html">Voice notes</a>
          <a class="mode-tab is-active" href="/dictation.html">Dictation</a>
          <a class="mode-tab" href="/vocabulary.html">Vocabulary</a>
          <form class="logout-form" action="/logout" method="post">
            <button class="mode-tab lock-tab" type="submit">Lock</button>
          </form>
        </nav>

        <form id="dictation-form" class="tts-form">
          <label class="field-label" for="source-text">Source sentence</label>
          <textarea
            id="source-text"
            name="sourceText"
            maxlength="1000"
            rows="7"
            placeholder="The coastal environment is home to many rare species."
            required
          ></textarea>

          <div class="form-meta">
            <span id="source-count">0 / 1000</span>
            <button type="button" id="dictation-sample" class="ghost-button">Sample</button>
          </div>

          <label class="field-label" for="dictation-voice">Voice</label>
          <select id="dictation-voice" name="voiceId">
            <option value="uk_female" selected>UK Female</option>
            <option value="uk_male">UK Male</option>
            <option value="us_female">US Female</option>
            <option value="us_male">US Male</option>
            <option value="au_male">AU Male</option>
            <option value="en_expressive_female">Expressive Female</option>
          </select>

          <div class="slider-row">
            <label for="dictation-speed">Speed <span id="dictation-speed-value">0.90x</span></label>
            <input id="dictation-speed" name="speed" type="range" min="0.5" max="1.2" step="0.05" value="0.9" />
          </div>

          <button type="submit" id="start-dictation" class="primary-button">Generate dictation</button>
        </form>
      </section>

      <section class="workspace" aria-live="polite">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Current exercise</p>
            <h2>Listen and type</h2>
          </div>
        </div>
        <div id="dictation-status" class="status"></div>
        <div id="dictation-current" class="dictation-current empty-state">Generated dictation audio will appear here.</div>

        <div class="history-header">
          <div>
            <p class="eyebrow">Local archive</p>
            <h2>Dictation history</h2>
          </div>
          <div class="history-actions">
            <span id="dictation-page-status" class="page-status"></span>
            <button type="button" id="dictation-prev" class="ghost-button">Prev</button>
            <button type="button" id="dictation-next" class="ghost-button">Next</button>
            <button type="button" id="clear-dictation" class="ghost-button">Clear</button>
          </div>
        </div>
        <div class="history-filters compact-history-filters" aria-label="Dictation history filters">
          <label class="filter-field" for="dictation-search">
            <span>Search</span>
            <input id="dictation-search" type="search" placeholder="Sentence, voice, answer, mistakes" />
          </label>
          <button type="button" id="dictation-reset" class="ghost-button">Reset</button>
        </div>
        <div id="dictation-filter-status" class="filter-status"></div>
        <div id="dictation-list" class="history-list empty-state">No dictation records yet.</div>
      </section>
    </main>

    <script src="/dictation.js" type="module"></script>
  </body>
</html>
